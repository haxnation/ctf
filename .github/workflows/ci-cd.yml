name: HaxNation CTF Build & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests (Vitest)
        run: npm run test:unit

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        # We start a lightweight local server on port 8080 in the background (&) 
        # so Playwright has a URL to test against.
        run: |
          npx http-server ./ -p 8080 -s & 
          npm run test:e2e

  deploy:
    name: Deploy to GitHub Pages
    needs: test # This guarantees deployment ONLY happens if tests pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push to the gh-pages branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy static files to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          cname: ctf.haxnation.org